    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000000;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Intro Screen Styles */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-out;
        }

        .intro-text {
            color: #FFFFFF;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .intro-typing-wrapper {
            overflow: hidden;
            border-right: .15em solid #FFFFFF;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: 0.1em;
            animation: 
                typing 2s steps(11, end),
                blink-caret .75s step-end infinite;
            width: 0;
            animation-fill-mode: forwards;
        }

        .intro-shorts {
            display: inline-flex;
            align-items: baseline;
            vertical-align: bottom;
            transition: color 0.6s ease, padding-left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .intro-short-part {
            display: inline-block;
            overflow: hidden;
            width: 5.5ch; /* 'short' length + buffer */
            text-align: right; /* Ensure text sticks to the right (near 's') */
            margin-right: 0.1em; /* Restore letter-spacing between t and s */
            transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1), margin-right 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            white-space: nowrap;
        }

        .intro-shorts.collapsed {
            color: #FF0000;
            padding-left: calc(5.5ch + 0.1em); /* Compensate for width + margin reduction */
        }

        .intro-shorts.collapsed .intro-short-part {
            width: 0 !important;
            margin-right: 0 !important;
        }

        .intro-news {
            color: #FFFFFF;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 12ch }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #FFFFFF }
        }

        .intro-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Landscape Warning */
        .landscape-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #FFFFFF;
            text-align: center;
        }

        .landscape-warning .icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: rotate-phone 2s infinite ease-in-out;
        }

        .landscape-warning p {
            font-size: 18px;
            font-weight: 600;
        }

        @keyframes rotate-phone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        @media screen and (orientation: landscape) {
            .landscape-warning {
                display: flex;
            }
            .reels-container, .top-ui, .nav-hint, .progress-container {
                display: none !important;
            }
        }

        /* Desktop: Show as phone-sized container centered with black background */
        @media screen and (min-width: 768px) {
            .landscape-warning {
                display: none !important;
            }
            
            .reels-container, .nav-hint, .progress-container {
                display: block !important;
            }
            
            .top-ui {
                display: flex !important;
            }
            
            html, body {
                background: #000000;
            }
            
            .reels-container {
                max-width: 430px;
                margin: 0 auto;
                box-shadow: 0 0 60px rgba(255, 255, 255, 0.08);
                border-left: 1px solid rgba(255, 255, 255, 0.1);
                border-right: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            .reel {
                max-width: 430px;
            }
            
            .top-ui {
                max-width: 430px;
                left: 50% !important;
                transform: translateX(-50%);
                right: auto !important;
            }
            
            .progress-container {
                max-width: 430px;
                left: 50%;
                transform: translateX(-50%);
            }
            
            .nav-hint {
                max-width: 430px;
                left: 50%;
                transform: translateX(-50%);
            }
        }


        .reels-container {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .reels-container::-webkit-scrollbar {
            display: none;
        }
        
        .reel {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            background-color: #000000;
            transition: transform 0.3s ease;
        }
        
        .reel-bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60%;
            background-size: cover;
            background-position: center;
            filter: blur(25px);
            opacity: 0.5;
            transform: scale(1.1);
            z-index: 0;
        }
        
        .reel-img-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            overflow: hidden;
            background: rgba(0,0,0,0.1);
        }

        .reel-main-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 1;
            transition: transform 0.5s ease;
        }
        
        .reel-gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }
        
        .content-overlay {
            position: absolute;
            top: 60%;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #000000;
            z-index: 10;
            padding: 24px;
            padding-top: 0; /* Title starts right at the top of this container */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            animation: slideUp 0.5s ease-out;
            overflow: visible; /* Allow gradient to extend upwards */
        }
        
        .content-overlay::before {
            content: '';
            position: absolute;
            top: -150px; /* Gradient height */
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(to bottom, transparent, #000000);
            pointer-events: none;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .reel-title {
            color: #FFFFFF;
            font-size: 28px;
            font-weight: 800;
            line-height: 1.35;
            margin-bottom: 14px;
            word-wrap: break-word;
            letter-spacing: -0.5px;
        }
        
        .reel-summary {
            color: rgba(255, 255, 255, 0.95);
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 60px; /* Space for the button */
            white-space: pre-line;
            font-weight: 400;
        }
        
        .reel-summary strong {
            color: #FFFFFF;
            font-weight: 700;
        }
        
        .reel-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            white-space: nowrap;
        }
        
        .reel-source {
            background: #3B82F6;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            color: #FFFFFF;
            display: inline-flex;
            align-items: center;
        }
        
        .meta-separator {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 300;
        }
        
        .reel-date {
            color: #E5E7EB;
            font-size: 13px;
            font-weight: 500;
        }
        
        .reel-tag {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 400;
        }
        
        .reel-link {

            bottom: 80px;  /* 모바일 주소창 간섭 방지를 위해 상향 조정 */
            right: 20px;
            background: rgba(255, 255, 255, 0.15);

            border: 1px solid rgba(255, 255, 255, 0.3);

        .reel-link {

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

"마이크로소프트, 오픈클로 기반 자율 AI 에이전트 ‘스카우트’ 공개", "link": "https://www.itworld.co.kr/article/4181454/%eb%a7%88%ec%9d%b4%ed%81%ac%eb%a1%9c%ec%86%8c%ed%94%84%ed%8a%b8-%ec%98%a4%ed%94%88%ed%81%b4%eb%a1%9c-%ea%b8%b0%eb%b0%98-%ec%9e%90%ec%9c%a8-ai-%ec%97%90%ec%9d%b4%ec%a0%84%ed%8a%b8-%ec%8a%a4%ec%b9%b4.html", "date": "2026-06-05", "source": "ITWorld", "description": "\n\t\t\n\t\t\t\t\t  \n\t\t\t\t\t\t\n\n\n\n\n마이크로소프트가 마이크로소프트 365 앱 전반에서 자율적으로 작업을 수행하는 새로운 AI 에이전트를 개발했다.\n\n\n\n마이크로소프트 스카우트(마이크로소프트 Scout)는 화요일 마이크로소프트 빌드 컨퍼런스에서 공개됐다. 오픈클로 에이전트 프레임워크를 기반으로 하며, 마이크로소프트가 ‘오토파일럿(Autopilot)’이라고 명명한 새로운 유형의 상시 가동형 에이전트다.\n\n\n\n마이크로소프트 부사장 오마르 샤힌은 블로그 포스트에서 “오토파일럿은 자체적으로 관리되는 엔트라(Entra) 아이덴티티를 갖추고 사용자를 대신해 행동한다”라고 밝혔다.\n\n\n\n샤힌은 “오토파일럿은 배경에서 항상 활성 상태를 유지하며, 앱과 시스템 전반에서 업무가 이루어지는 방식을 이해하고, 매번 지시받지 않아도 알아서 행동한다”라고 설명했다. 샤힌은 오픈클로 기반의 개인 비서 기능을 마이크로소프트 365 앱에 도입하는 신규 팀을 이끌고 있음을 최근 공개한 마이크로소프트 베테랑이다.", "image": "https://www.itworld.co.kr/wp-content/uploads/2026/06/4181454-0-16347600-1780622051-shutterstock_1536940715.jpg?quality=50&strip=all", "is_english": false, "original_title": "마이크로소프트, 오픈클로 기반 자율 AI 에이전트 ‘스카우트’ 공개", "original_summary": "\n\t\t\n\t\t\t\t\t  \n\t\t\t\t\t\t\n\n\n\n\n마이크로소프트가 마이크로소프트 365 앱 전반에서 자율적으로 작업을 수행하는 새로운 AI 에이전트를 개발했다.\n\n\n\n마이크로소프트 스카우트(마이크로소프트 Scout)는 화요일 마이크로소프트 빌드 컨퍼런스에서 공개됐다. 오픈클로 에이전트 프레임워크를 기반으로 하며, 마이크로소프트가 ‘오토파일럿(Autopilot)’이라고 명명한 새로운 유형의 상시 가동형 에이전트다.\n\n\n\n마이크로소프트 부사장 오마르 샤힌은 블로그 포스트에서 “오토파일럿은 자체적으로 관리되는 엔트라(Entra) 아이덴티티를 갖추", "summary": "\n\t\t\n\t\t\t\t\t  \n\t\t\t\t\t\t\n\n\n\n\n마이크로소프트가 마이크로소프트 365 앱 전반에서 자율적으로 작업을 수행하는 새로운 AI 에이전트를 개발했다.\n\n\n\n마이크로소프트 스카우트(마이크로소프트 Scout)는 화요일 마이크로소프트 빌드 컨퍼런스에서 공개됐다. 오픈클로 에이전트 프레임워크를 기반으로 하며, 마이크로소프트가 ‘오토파일럿(Autopilot)’이라고 명명한 새로운 유형의 상시 가동형 에이전트다.\n\n\n\n마이크로소프트 부사장 오마르 샤힌은 블로그 포스트에서 “오토파일럿은 자체적으로 관리되는 엔트라(Entra) 아이덴티티를 갖추"}, {"title": "더 큰 모델보다 더 나은 데이터가 먼저다", "link": "https://www.itworld.co.kr/article/4181443/%eb%8d%94-%ed%81%b0-%eb%aa%a8%eb%8d%b8%eb%b3%b4%eb%8b%a4-%eb%8d%94-%eb%82%98%ec%9d%80-%eb%8d%b0%ec%         const container = document.getElementById('reelsContainer');
        const progressFill = document.getElementById('progressFill');
        const dateSelect = document.getElementById('dateSelect');
        
        let currentData = allNewsFlat;
        let currentIndex = 0;
        let currentTab = 'news';
        
        function switchTab(tab) {
            currentTab = tab;
            const tabNews = document.getElementById('tabNews');
            const tabModel = document.getElementById('tabModel');
            const dateSelectWrapper = document.getElementById('dateSelectWrapper');
            
            if (tab === 'news') {
                tabNews.classList.add('active');
                tabModel.classList.remove('active');
                if (dateSelectWrapper) dateSelectWrapper.style.display = 'flex';
                currentDateIndex = 0;
                const selectedDate = allDates[0] || '';
                dateSelect.value = selectedDate;
                currentData = allNewsFlat.filter(item => item.category !== 'AI Model' && item.date === selectedDate);
            } else {
                tabNews.classList.remove('active');
                tabModel.classList.add('active');
                if (dateSelectWrapper) dateSelectWrapper.style.display = 'none';
                currentData = allNewsFlat.filter(item => item.category === 'AI Model').slice(0, 20);
            }
            
            currentIndex = 0;
            renderReels(currentData);
            container.scrollTop = 0;
        }
        
        function renderReels(newsItems, startIndex = 0) {
            container.innerHTML = '';
            
            const defaultImages = [
                'https://images.unsplash.com/photo-1677442136019-21780ecad995',
                'https://images.unsplash.com/photo-1555255707-c07966088b7b',
                'https://images.unsplash.com/photo-1620712943543-bcc4688e7485'
            ];
            
            newsItems.forEach((item, index) => {
                const reel = document.createElement('div');
                reel.className = 'reel';
                
                const bgImage = item.image 
                    ? item.image 
                    : defaultImages[(startIndex + index) % defaultImages.length];
                
                const keywordTag = item.category_keyword ? `<span class="meta-separator">|</span><span class="reel-tag">#${item.category_keyword}</span>` : '';
                const displayTitle = item.translated_title || item.title;
                
                // 날짜 불일치 해결: new Date() 사용을 피하고 문자열 앞 10자리(YYYY-MM-DD)를 그대로 사용
                const displayDate = item.date.substring(5, 10);
                
                let summaryText = item.summary || '전체 기사 내용을 확인하려면 아래 링크를 클릭하세요.';
                // 불렛 포인트를 이모지로 변경하여 가독성 개선
                summaryText = summaryText.replace(/•/g, '✔️');
                
                reel.innerHTML = `
                    <div class="reel-bg-blur" style="background-image: url(${bgImage})"></div>
                    <div class="reel-img-container">
                        <img class="reel-main-img" src="${bgImage}" alt="News Image">
                        <div class="reel-gradient-overlay"></div>
                    </div>
                    <div class="content-overlay">
                        <div class="reel-meta">
                            <span class="reel-source">${item.source || 'Unknown'}</span>
                            <span class="meta-separator">|</span>
                            <span class="reel-date">${displayDate}</span>
                            ${keywordTag}
                        </div>
                        <h2 class="reel-title">${displayTitle}</h2>
                        <div class="reel-summary">${summaryText}</div>
                    </div>
                    <a class="reel-link" href="${item.link}" target="_blank">자세히 보기 &gt;</a>
                `;
                
                container.appendChild(reel);
            });
            
            updateProgress();
        }
        
        function updateProgress() {
            const reels = container.querySelectorAll('.reel');
            if (reels.length > 0) {
                const progress = ((currentIndex + 1) / reels.length) * 100;
                progressFill.style.width = `${progress}%`;
            }
        }
        
        function loadNewsForDate(date) {
            if (currentTab === 'model') return;
            
            currentDateIndex = allDates.indexOf(date);
            if (currentDateIndex === -1) currentDateIndex = 0;
            
            currentData = allNewsFlat.filter(item => item.category !== 'AI Model' && item.date === date);
            currentIndex = 0;
            renderReels(currentData);
            container.scrollTop = 0;
        }
        
        function goToLatest() {
            if (currentData.length > 0) {
                currentIndex = 0;
                renderReels(currentData);
                container.scrollTop = 0;
            }
        }
        
        const allDates = [...new Set(allNewsFlat.filter(item => item.category !== 'AI Model').map(item => item.date))].sort().reverse();
        let currentDateIndex = 0;
        
        function loadNextDate() {
            if (currentTab !== 'news') return false;
            if (currentDateIndex >= allDates.length - 1) return false;
            
            currentDateIndex++;
            const nextDate = allDates[currentDateIndex];
            const nextDateNews = allNewsFlat.filter(item => item.category !== 'AI Model' && item.date === nextDate);
            
            nextDateNews.forEach(item => {
                currentData.push(item);
            });
            
            renderReels(currentData);
            dateSelect.value = nextDate;
            return true;
        }
        
        container.addEventListener('scroll', () => {
            const reelHeight = window.innerHeight;
            currentIndex = Math.round(container.scrollTop / reelHeight);
            updateProgress();
            
            if (currentTab === 'news' && currentData[currentIndex]) {
                const currentDate = currentData[currentIndex].date;
                if (dateSelect.value !== currentDate) {
                    dateSelect.value = currentDate;
                }
            }
            
            const isAtBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 10;
            if (currentTab === 'news' && isAtBottom && currentIndex >= currentData.length - 1) {
                loadNextDate();
            }
        }, { passive: true });
        
        // 초기화: News 탭의 첫 번째 날짜 데이터만 렌더링
        const firstDate = allNewsFlat.length > 0 ? allNewsFlat[0].date : '';
        currentData = allNewsFlat.filter(item => item.category !== 'AI Model' && item.date === firstDate);
        renderReels(currentData);
        
        if (firstDate) {
            dateSelect.value = firstDate;
        }
        
        let touchStartY = 0;
        let isAtLastItem = false;
        
        container.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            const reelHeight = window.innerHeight;
            const currentIdx = Math.round(container.scrollTop / reelHeight);
            isAtLastItem = currentIdx >= currentData.length - 1;
        }, { passive: true });
        
        container.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            
            // 마지막 아이템에서 위로 스와이프 (diff > 50) 하면 다음 날짜 로드
            if (currentTab === 'news' && isAtLastItem && diff > 50) {
                const loaded = loadNextDate();
                if (loaded) {
                    // 새로 로드된 첫 번째 아이템으로 스크롤
                    setTimeout(() => {
                        const reelHeight = window.innerHeight;
                        container.scrollTop = currentIndex * reelHeight + reelHeight;
                    }, 100);
                }
            }
        }, { passive: true });
    </script>
