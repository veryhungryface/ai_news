<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000000;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Intro Screen Styles */
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-out;
        }

        .intro-text {
            color: #FFFFFF;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .intro-typing-wrapper {
            overflow: hidden;
            border-right: .15em solid #FFFFFF;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: 0.1em;
            animation: 
                typing 2s steps(11, end),
                blink-caret .75s step-end infinite;
            width: 0;
            animation-fill-mode: forwards;
        }

        .intro-shorts {
            display: inline-flex;
            align-items: baseline;
            vertical-align: bottom;
            transition: color 0.6s ease, padding-left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .intro-short-part {
            display: inline-block;
            overflow: hidden;
            width: 5.5ch; /* 'short' length + buffer */
            text-align: right; /* Ensure text sticks to the right (near 's') */
            margin-right: 0.1em; /* Restore letter-spacing between t and s */
            transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1), margin-right 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            white-space: nowrap;
        }

        .intro-shorts.collapsed {
            color: #FF0000;
            padding-left: calc(5.5ch + 0.1em); /* Compensate for width + margin reduction */
        }

        .intro-shorts.collapsed .intro-short-part {
            width: 0 !important;
            margin-right: 0 !important;
        }

        .intro-news {
            color: #FFFFFF;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 12ch }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #FFFFFF }
        }

        .intro-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Landscape Warning */
        .landscape-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #FFFFFF;
            text-align: center;
        }

        .landscape-warning .icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: rotate-phone 2s infinite ease-in-out;
        }

        .landscape-warning p {
            font-size: 18px;
            font-weight: 600;
        }

        @keyframes rotate-phone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        @media screen and (orientation: landscape) {
            .landscape-warning {
                display: flex;
            }
            .reels-container, .top-ui, .nav-hint, .progress-container {
                display: none !important;
            }
        }

        /* Desktop: Show as phone-sized container centered with black background */
        @media screen and (min-width: 768px) {
            .landscape-warning {
                display: none !important;
            }
            
            .reels-container, .nav-hint, .progress-container {
                display: block !important;
            }
            
            .top-ui {
                display: flex !important;
            }
            
            html, body {
                background: #000000;
            }
            
            .reels-container {
                max-width: 430px;
                margin: 0 auto;
                box-shadow: 0 0 60px rgba(255, 255, 255, 0.08);
                border-left: 1px solid rgba(255, 255, 255, 0.1);
                border-right: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            .reel {
                max-width: 430px;
            }
            
            .top-ui {
                max-width: 430px;
                left: 50% !important;
                transform: translateX(-50%);
                right: auto !important;
            }
            
            .progress-container {
                max-width: 430px;
                left: 50%;
                transform: translateX(-50%);
            }
            
            .nav-hint {
                max-width: 430px;
                left: 50%;
                transform: translateX(-50%);
            }
        }


        .reels-container {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .reels-container::-webkit-scrollbar {
            display: none;
        }
        
        .reel {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            background-color: #000000;
            transition: transform 0.3s ease;
        }
        
        .reel-bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60%;
            background-size: cover;
            background-position: center;
            filter: blur(25px);
            opacity: 0.5;
            transform: scale(1.1);
            z-index: 0;
        }
        
        .reel-img-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            overflow: hidden;
            background: rgba(0,0,0,0.1);
        }

        .reel-main-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 1;
            transition: transform 0.5s ease;
        }
        
        .reel-gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }
        
        .content-overlay {
            position: absolute;
            top: 60%;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #000000;
            z-index: 10;
            padding: 24px;
            padding-top: 0; /* Title starts right at the top of this container */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            animation: slideUp 0.5s ease-out;
            overflow: visible; /* Allow gradient to extend upwards */
        }
        
        .content-overlay::before {
            content: '';
            position: absolute;
            top: -150px; /* Gradient height */
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(to bottom, transparent, #000000);
            pointer-events: none;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .reel-title {
            color: #FFFFFF;
            font-size: 28px;
            font-weight: 800;
            line-height: 1.35;
            margin-bottom: 14px;
            word-wrap: break-word;
            letter-spacing: -0.5px;
        }
        
        .reel-summary {
            color: rgba(255, 255, 255, 0.95);
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 60px; /* Space for the button */
            white-space: pre-line;
            font-weight: 400;
        }
        
        .reel-summary strong {
            color: #FFFFFF;
            font-weight: 700;
        }
        
        .reel-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            white-space: nowrap;
        }
        
        .reel-source {
            background: #3B82F6;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            color: #FFFFFF;
            display: inline-flex;
            align-items: center;
        }
        
        .meta-separator {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 300;
        }
        
        .reel-date {
            color: #E5E7EB;
            font-size: 13px;
            font-weight: 500;
        }
        
        .reel-tag {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 400;
        }
        
        .reel-link {
            position: absolute;
            bottom: 80px;  /* 모바일 주소창 간섭 방지를 위해 상향 조정 */
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 10px 20px;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 600;

            z-index: 10;

        }
        
        .reel-link:active {
            transform: scale(0.95);
        }

        @keyframes pulse-btn {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }

        .reel-link {
            animation: pulse-btn 3s infinite;
        }
        
        .top-ui {

        .nav-hint {

            color: #9CA3AF;
            font-size: 12px;
            font-weight: 500;

        .progress-container {

            height: 100%;
            background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

                            <span class="reel-source">${item.source || 'Unknown'}</span>
                            <span class="meta-separator">|</span>
                            <span class="reel-date">${displayDate}</span>
                            ${keywordTag}
                        </div>
                        <h2 class="reel-title">${displayTitle}</h2>
                        <div class="reel-summary">${summaryText}</div>
                    </div>
                    <a class="reel-link" href="${item.link}" target="_blank">자세히 보기 &gt;</a>
                `;
                
                container.appendChild(reel);
            });
            
            updateProgress();
        }
        
        function updateProgress() {
            const reels = container.querySelectorAll('.reel');
            if (reels.length > 0) {
                const progress = ((currentIndex + 1) / reels.length) * 100;
                progressFill.style.width = `${progress}%`;
            }
        }
        
        function loadNewsForDate(date) {
            if (currentTab === 'model') return;
            
            currentDateIndex = allDates.indexOf(date);
            if (currentDateIndex === -1) currentDateIndex = 0;
            
            currentData = allNewsFlat.filter(item => item.category !== 'AI Model' && item.date === date);
            currentIndex = 0;
            renderReels(currentData);
            container.scrollTop = 0;
        }
        
        function goToLatest() {
            if (currentData.length > 0) {
                currentIndex = 0;
                renderReels(currentData);
                container.scrollTop = 0;
            }
        }
        
        const allDates = [...new Set(allNewsFlat.filter(item => item.category !== 'AI Model').map(item => item.date))].sort().reverse();
        let currentDateIndex = 0;
        
        function loadNextDate() {
            if (currentTab !== 'news') return false;
            if (currentDateIndex >= allDates.length - 1) return false;
            
            currentDateIndex++;
            const nextDate = allDates[currentDateIndex];
            const nextDateNews = allNewsFlat.filter(item => item.category !== 'AI Model' && item.date === nextDate);
            
            nextDateNews.forEach(item => {
                currentData.push(item);
            });
            
            renderReels(currentData);
            dateSelect.value = nextDate;
            return true;
        }
        
        container.addEventListener('scroll', () => {
            const reelHeight = window.innerHeight;
            currentIndex = Math.round(container.scrollTop / reelHeight);
            updateProgress();
            
            if (currentTab === 'news' && currentData[currentIndex]) {
                const currentDate = currentData[currentIndex].date;
                if (dateSelect.value !== currentDate) {
                    dateSelect.value = currentDate;
                }
            }
            
            const isAtBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 10;
            if (currentTab === 'news' && isAtBottom && currentIndex >= currentData.length - 1) {
                loadNextDate();
            }
        }, { passive: true });
        
        // 초기화: News 탭의 첫 번째 날짜 데이터만 렌더링
        const firstDate = allNewsFlat.length > 0 ? allNewsFlat[0].date : '';
        currentData = allNewsFlat.filter(item => item.category !== 'AI Model' && item.date === firstDate);
        renderReels(currentData);
        
        if (firstDate) {
            dateSelect.value = firstDate;
        }
        
        let touchStartY = 0;
        let isAtLastItem = false;
        
        container.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            const reelHeight = window.innerHeight;
            const currentIdx = Math.round(container.scrollTop / reelHeight);
            isAtLastItem = currentIdx >= currentData.length - 1;
        }, { passive: true });
        
        container.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            
            // 마지막 아이템에서 위로 스와이프 (diff > 50) 하면 다음 날짜 로드
            if (currentTab === 'news' && isAtLastItem && diff > 50) {
                const loaded = loadNextDate();
                if (loaded) {
                    // 새로 로드된 첫 번째 아이템으로 스크롤
                    setTimeout(() => {
                        const reelHeight = window.innerHeight;
                        container.scrollTop = currentIndex * reelHeight + reelHeight;
                    }, 100);
                }
            }
        }, { passive: true });
    </script>
</body>
</html>
